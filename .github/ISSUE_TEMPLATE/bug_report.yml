name: Bug Report
description: File a bug report to help us improve Lalog
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: lalog_version
    attributes:
      label: Lalog Version
      description: Which version of Lalog are you using?
      placeholder: e.g., 1.0.0
    validations:
      required: true
  - type: input
    id: laravel_version
    attributes:
      label: Laravel Version
      description: Which version of Laravel are you using?
      placeholder: e.g., 11.x
    validations:
      required: true
  - type: input
    id: php_version
    attributes:
      label: PHP Version
      description: Which version of PHP are you using?
      placeholder: e.g., 8.2.0
    validations:
      required: true
  - type: input
    id: database
    attributes:
      label: Database & Version
      description: Which database system and version are you using?
      placeholder: e.g., MySQL 8.0.30, PostgreSQL 15, or SQLite
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior. Please provide any code or query needed to reproduce the issue.
      placeholder: |
        1. Configure lalog with...
        2. Set APP_LOG_QUERY=true
        3. Execute User::where('id', 1)->first()
        4. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output (stack traces, Lalog output, or errors) here.
      render: shell
